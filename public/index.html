<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 미국주식 뉴스</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        h1 {
            font-size: 36px;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 16px;
            color: #7f8c8d;
            font-weight: 300;
        }
        
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .stock-card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 2px solid transparent;
        }
        
        .stock-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            border-color: #3498db;
        }
        
        .stock-code {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .stock-name {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            line-height: 1.4;
        }
        
        .stock-card.pltr .stock-code {
            color: #3498db;
        }
        .stock-card.pltr .stock-name {
            color: #2c3e50;
        }
        .stock-card.pltr:hover {
            background: linear-gradient(135deg, #3498db15 0%, #2980b915 100%);
        }
        
        .stock-card.iren .stock-code {
            color: #e74c3c;
        }
        .stock-card.iren .stock-name {
            color: #2c3e50;
        }
        .stock-card.iren:hover {
            background: linear-gradient(135deg, #e74c3c15 0%, #c0392b15 100%);
        }
        
        .stock-card.ionq .stock-code {
            color: #9b59b6;
        }
        .stock-card.ionq .stock-name {
            color: #2c3e50;
        }
        .stock-card.ionq:hover {
            background: linear-gradient(135deg, #9b59b615 0%, #8e44ad15 100%);
        }
        
        .stock-card.bmnr .stock-code {
            color: #27ae60;
        }
        .stock-card.bmnr .stock-name {
            color: #2c3e50;
        }
        .stock-card.bmnr:hover {
            background: linear-gradient(135deg, #27ae6015 0%, #22995415 100%);
        }
        
        .footer {
            text-align: center;
            color: #7f8c8d;
            font-size: 13px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 실시간 미국주식 뉴스</h1>
            <p class="subtitle">종목을 선택하면 최신 뉴스를 확인할 수 있습니다</p>
        </div>
        
        <div class="stocks-grid">
            <a href="news.html?stock=palantir&name=팔란티어" class="stock-card pltr">
                <div class="stock-code">PLTR</div>
                <div class="stock-name">팔란티어</div>
            </a>
            
            <a href="news.html?stock=iren&name=아이렌" class="stock-card iren">
                <div class="stock-code">IREN</div>
                <div class="stock-name">아이렌</div>
            </a>
            
            <a href="news.html?stock=ionq&name=아이온큐" class="stock-card ionq">
            <div class="stock-code">IONQ</div>
            <div class="stock-name">아이온큐</div>
            </a>
            
            <a href="news.html?stock=biomarin&name=비트마인" class="stock-card bmnr">
            <div class="stock-code">BMNR</div>
            <div class="stock-name">비트마인</div>
            </a>
        </div>
        
        <div class="footer">
            💡 최신 뉴스는 자동으로 수집되며, Claude AI가 분석합니다.
        </div>
    </div>
</body>
</html>
