<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC 공시</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
        }

        .header-left { flex: 1; }

        .youtube-link {
            display: inline-block;
            font-size: 12px;
            color: #7f8c8d;
            text-decoration: none;
            transition: 0.3s;
            padding: 5px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .youtube-link:hover {
            color: #607D8B;
            background: rgba(96, 125, 139, 0.05);
        }

        h1 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }

        .back-btn {
            background: #607D8B;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #546E7A;
            transform: scale(1.05);
        }

        .button-group {
            text-align: center;
            margin-bottom: 30px;
        }

        .refresh-btn {
            background: #607D8B;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .refresh-btn:hover {
            background: #546E7A;
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            color: #607D8B;
            font-size: 16px;
            padding: 40px;
            display: none;
            font-weight: 500;
        }

        #secList {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sec-item {
            border-left: 4px solid #607D8B;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .sec-item:hover {
            background: #ecf0f1;
            box-shadow: 0 5px 15px rgba(96, 125, 139, 0.2);
        }

        .sec-date {
            font-size: 13px;
            font-weight: 700;
            color: #607D8B;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .sec-form {
            display: inline-block;
            background: #607D8B;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .sec-form-desc {
            display: inline-block;
            font-size: 14px;
            color: #546E7A;
            font-weight: 600;
            margin-left: 8px;
            margin-bottom: 15px;
        }

        .analysis-box {
            background: white;
            border-left: 3px solid #607D8B;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 14px;
            line-height: 1.7;
            color: #444;
        }

        .analysis-section-title {
            font-weight: 700;
            color: #607D8B;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        .sec-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background: #607D8B;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .sec-link:hover {
            background: #546E7A;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(96, 125, 139, 0.3);
        }

        .error {
            color: #c0392b;
            text-align: center;
            padding: 25px;
            background: #fadbd8;
            border-radius: 8px;
            display: none;
        }

        .empty {
            text-align: center;
            color: #95a5a6;
            padding: 60px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <a href="https://www.youtube.com/@투자의정석-z2o" target="_blank" class="youtube-link">
                    🎬 투자의정석
                </a>
                <h1 id="pageTitle">SEC 공시</h1>
            </div>
            <button class="back-btn" onclick="goHome()">← 돌아가기</button>
        </div>

        <div class="button-group">
            <button class="refresh-btn" onclick="fetchSec()">🔄 공시 갱신</button>
        </div>

        <div class="loading" id="loading">
            ⏳ SEC 공시를 가져오고 AI가 분석하는 중입니다...
        </div>

        <div class="error" id="error"></div>

        <div id="secList">
            <div class="empty">
                "공시 갱신" 버튼을 클릭해서 최신 SEC 공시를 확인하세요!
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const stock = params.get('stock');
        const stockName = params.get('name');

        if (stockName) {
            document.getElementById('pageTitle').textContent = `${stockName} SEC 공시`;
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        async function fetchSec() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const secList = document.getElementById('secList');

            loading.style.display = 'block';
            error.style.display = 'none';
            secList.innerHTML = '';

            try {
                const response = await fetch(`/api/sec?stock=${stock}`);
                const data = await response.json();

                if (!data.success) {
                    error.textContent = '❌ 공시를 불러올 수 없습니다.';
                    error.style.display = 'block';
                    loading.style.display = 'none';
                    return;
                }

                if (data.sec && data.sec.length > 0) {
                    secList.innerHTML = data.sec.map((item) => `
                        <div class="sec-item">
                            <div class="sec-date">📅 ${item.filingDate}</div>
                            <div>
                                <span class="sec-form">${item.form}</span>
                                <span class="sec-form-desc">(${item.formDesc})</span>
                            </div>
                            ${item.analysis ? `
                            <div class="analysis-box">
                                ${item.analysis
                                    .replace(/\[([^\]]+)\]/g, '<div class="analysis-section-title">[$1]</div>')
                                    .replace(/\n/g, '<br>')}
                            </div>
                            ` : ''}
                            <a href="${item.url}" target="_blank" class="sec-link">
                                📋 SEC 원문 보기
                            </a>
                        </div>
                    `).join('');
                } else {
                    secList.innerHTML = '<div class="empty">공시가 없습니다.</div>';
                }

            } catch (err) {
                error.textContent = '❌ 오류 발생: ' + err.message;
                error.style.display = 'block';
            }

            loading.style.display = 'none';
        }
    </script>
</body>
</html>
