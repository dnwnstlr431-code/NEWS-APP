<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실적 발표</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
        }
        .header-left { flex: 1; }
        .youtube-link {
            display: inline-block;
            font-size: 12px;
            color: #7f8c8d;
            text-decoration: none;
            padding: 5px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            transition: 0.3s;
        }
        .youtube-link:hover { color: #e67e22; background: rgba(230,126,34,0.05); }
        h1 { color: #2c3e50; font-size: 28px; font-weight: 700; margin: 0; }
        .back-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            white-space: nowrap;
        }
        .back-btn:hover { background: #d35400; transform: scale(1.05); }

        .update-info {
            text-align: center;
            color: #95a5a6;
            font-size: 13px;
            margin-bottom: 25px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        .update-info span { color: #e67e22; font-weight: 600; }

        .loading { text-align: center; color: #e67e22; font-size: 16px; padding: 60px; font-weight: 500; }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 4px solid #ecf0f1;
            border-top: 4px solid #e67e22;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

        #earningsList { display: flex; flex-direction: column; gap: 25px; }

        .earnings-item {
            border-left: 4px solid #e67e22;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .earnings-item.future {
            border-left-color: #3498db;
            background: #EBF5FB;
        }
        .earnings-item:hover { box-shadow: 0 5px 15px rgba(230,126,34,0.15); }
        .earnings-item.future:hover { box-shadow: 0 5px 15px rgba(52,152,219,0.15); }

        .earnings-badge-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .badge-future {
            background: #3498db;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .badge-beat {
            background: #27ae60;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .badge-miss {
            background: #e74c3c;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .badge-meet {
            background: #95a5a6;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .earnings-date {
            font-size: 13px;
            font-weight: 700;
            color: #7f8c8d;
        }
        .earnings-hour {
            font-size: 12px;
            color: #95a5a6;
            background: #ecf0f1;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .eps-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 14px 0;
        }
        .eps-box {
            background: white;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            border: 1px solid #ecf0f1;
        }
        .eps-label {
            font-size: 11px;
            color: #95a5a6;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .eps-value {
            font-size: 22px;
            font-weight: 700;
            color: #2c3e50;
        }
        .eps-value.beat { color: #27ae60; }
        .eps-value.miss { color: #e74c3c; }
        .eps-sub {
            font-size: 10px;
            color: #bbb;
            margin-top: 3px;
        }

        .analysis-box {
            background: white;
            border-left: 3px solid #e67e22;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 14px;
            line-height: 1.7;
            color: #444;
        }
        .earnings-item.future .analysis-box { border-left-color: #3498db; }
        .analysis-section-title {
            font-weight: 700;
            color: #e67e22;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        .earnings-item.future .analysis-section-title { color: #3498db; }

        .error { color: #c0392b; text-align: center; padding: 25px; background: #fadbd8; border-radius: 8px; display: none; }
        .empty { text-align: center; color: #95a5a6; padding: 60px 20px; font-size: 16px; }

        /* ── 모바일 반응형 ── */
        @media (max-width: 768px) {
            body { padding: 0 !important; }
            .container { border-radius: 0 !important; padding: 16px !important; box-shadow: none !important; }
            .header { align-items: center !important; margin-bottom: 14px !important; padding-bottom: 14px !important; }
            .youtube-link { font-size: 11px !important; margin-bottom: 5px !important; }
            h1 { font-size: 18px !important; white-space: nowrap !important; }
            .back-btn { padding: 8px 12px !important; font-size: 12px !important; }
            .update-info { font-size: 11px !important; padding: 8px !important; margin-bottom: 16px !important; }
            #earningsList { gap: 14px !important; }
            .earnings-item { padding: 14px !important; }
            .eps-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
            .eps-value { font-size: 18px !important; }
            .analysis-box { padding: 12px !important; font-size: 13px !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <a href="https://www.youtube.com/@투자의정석-z2o" target="_blank" class="youtube-link">🎬 투자의정석</a>
                <h1 id="pageTitle">실적 발표</h1>
            </div>
            <button class="back-btn" onclick="goHome()">← 돌아가기</button>
        </div>
        <div class="update-info" id="updateInfo">⏳ 실적 데이터를 불러오는 중입니다...</div>
        <div id="earningsList">
            <div class="loading">
                <div class="loading-spinner"></div>
                AI가 실적을 분석하고 있습니다...
            </div>
        </div>
        <div class="error" id="error"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const stock = params.get('stock');
        const stockName = params.get('name');
        if (stockName) document.getElementById('pageTitle').textContent = `${stockName} 실적 발표`;

        function goHome() { window.location.href = 'index.html'; }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function formatEPS(val) {
            if (val === null || val === undefined) return '-';
            return (val >= 0 ? '+$' : '-$') + Math.abs(val).toFixed(2);
        }

        function formatRevenue(val) {
            if (!val) return '-';
            if (val >= 1e9) return '$' + (val / 1e9).toFixed(2) + 'B';
            if (val >= 1e6) return '$' + (val / 1e6).toFixed(0) + 'M';
            return '$' + val.toLocaleString();
        }

        async function loadEarnings() {
            const list = document.getElementById('earningsList');
            const updateInfo = document.getElementById('updateInfo');
            const error = document.getElementById('error');

            try {
                const response = await fetch(`/api/earnings?stock=${stock}`);
                const data = await response.json();

                if (!data.success) {
                    list.innerHTML = '<div class="empty">실적 데이터가 없습니다.</div>';
                    updateInfo.innerHTML = '❌ 데이터 없음';
                    return;
                }

                updateInfo.innerHTML = `📊 총 ${data.earnings.length}건의 실적 데이터`;

                list.innerHTML = data.earnings.map(item => {
                    const badgeHtml = item.isFuture
                        ? '<span class="badge-future">📅 발표 예정</span>'
                        : item.beatMiss === 'BEAT' ? '<span class="badge-beat">🎯 예상 초과</span>'
                        : item.beatMiss === 'MISS' ? '<span class="badge-miss">📉 예상 미달</span>'
                        : item.beatMiss === 'MEET' ? '<span class="badge-meet">➡️ 예상 부합</span>'
                        : '';

                    const epsActualClass = item.beatMiss === 'BEAT' ? 'beat' : item.beatMiss === 'MISS' ? 'miss' : '';

                    return `
                    <div class="earnings-item ${item.isFuture ? 'future' : ''}">
                        <div class="earnings-badge-row">
                            ${badgeHtml}
                            <span class="earnings-date">📅 ${formatDate(item.date)}</span>
                            <span class="earnings-hour">⏰ ${item.hourKo}</span>
                        </div>

                        <div class="eps-grid">
                            <div class="eps-box">
                                <div class="eps-label">📌 예상 주당순이익</div>
                                <div class="eps-value">${formatEPS(item.epsEstimate)}</div>
                                <div class="eps-sub">애널리스트 평균 예측값</div>
                            </div>
                            <div class="eps-box">
                                <div class="eps-label">${item.isFuture ? '💡 실제 (발표 전)' : '✅ 실제 주당순이익'}</div>
                                <div class="eps-value ${epsActualClass}">${item.isFuture ? '-' : formatEPS(item.epsActual)}</div>
                                <div class="eps-sub">${item.isFuture ? '발표 후 업데이트' : '실제 발표 수치'}</div>
                            </div>
                            <div class="eps-box">
                                <div class="eps-label">📊 예상 매출</div>
                                <div class="eps-value" style="font-size:16px">${formatRevenue(item.revenueEstimate)}</div>
                                <div class="eps-sub">시장 전망치</div>
                            </div>
                            <div class="eps-box">
                                <div class="eps-label">${item.isFuture ? '💡 실제 매출 (예정)' : '✅ 실제 매출'}</div>
                                <div class="eps-value" style="font-size:16px">${item.isFuture ? '-' : formatRevenue(item.revenueActual)}</div>
                                <div class="eps-sub">${item.isFuture ? '발표 후 업데이트' : '실제 발표 수치'}</div>
                            </div>
                        </div>

                        ${item.analysis ? `
                        <div class="analysis-box">
                            ${item.analysis
                                .replace(/\[([^\]]+)\]/g, '<div class="analysis-section-title">[$1]</div>')
                                .replace(/\n/g, '<br>')}
                        </div>` : ''}
                    </div>`;
                }).join('');

            } catch (err) {
                list.innerHTML = '';
                error.textContent = '❌ 오류 발생: ' + err.message;
                error.style.display = 'block';
            }
        }

        loadEarnings();
    </script>
</body>
</html>
