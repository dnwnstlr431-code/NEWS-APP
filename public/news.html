<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미국주식 실시간 뉴스 분석</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
        }

        .header-left {
            flex: 1;
        }

        .youtube-link {
            display: inline-block;
            font-size: 12px;
            color: #7f8c8d;
            text-decoration: none;
            transition: 0.3s;
            padding: 5px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .youtube-link:hover {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }
        
        h1 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }
        
        .back-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }
        
        .back-btn:hover {
            background: #2980b9;
            transform: scale(1.05);
        }
        
        .button-group {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .refresh-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .refresh-btn:hover {
            background: #229954;
            transform: scale(1.05);
        }
        
        .loading {
            text-align: center;
            color: #3498db;
            font-size: 16px;
            padding: 40px;
            display: none;
            font-weight: 500;
        }
        
        #newsList {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .news-item {
            border-left: 4px solid #3498db;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s;
        }

            background: #ecf0f1;
            box-shadow: 0
