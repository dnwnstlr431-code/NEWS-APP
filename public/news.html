<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
        }
        .header-left { flex: 1; }
        .youtube-link {
            display: inline-block;
            font-size: 12px;
            color: #7f8c8d;
            text-decoration: none;
            transition: 0.3s;
            padding: 5px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .youtube-link:hover { color: #e74c3c; background: rgba(231,76,60,0.05); }
        h1 { color: #2c3e50; font-size: 28px; font-weight: 700; margin: 0; }
        .back-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            white-space: nowrap;
        }
        .back-btn:hover { background: #2980b9; transform: scale(1.05); }
        .update-info {
            text-align: center;
            color: #95a5a6;
            font-size: 13px;
            margin-bottom: 25px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        .update-info span { color: #27ae60; font-weight: 600; }
        .loading { text-align: center; color: #3498db; font-size: 16px; padding: 60px; font-weight: 500; }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 4px solid #ecf0f1;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        #newsList { display: flex; flex-direction: column; gap: 25px; }
        .news-item {
            border-left: 4px solid #3498db;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .news-item:hover { background: #ecf0f1; box-shadow: 0 5px 15px rgba(52,152,219,0.2); }
        .news-date { font-size: 13px; font-weight: 700; color: #e74c3c; letter-spacing: 1px; margin-bottom: 10px; }
        .news-title { font-size: 18px; font-weight: 700; color: #2c3e50; margin-bottom: 12px; line-height: 1.5; }
        .news-source { font-size: 12px; color: #95a5a6; margin-bottom: 15px; }
        .analysis-box {
            background: white;
            border-left: 3px solid #9b59b6;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 14px;
            line-height: 1.7;
            color: #444;
        }
        .analysis-section-title { font-weight: 700; color: #9b59b6; margin-top: 10px; margin-bottom: 5px; }
        .news-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }
        .news-link:hover { background: #2980b9; transform: translateY(-2px); }
        .error { color: #c0392b; text-align: center; padding: 25px; background: #fadbd8; border-radius: 8px; display: none; }
        .empty { text-align: center; color: #95a5a6; padding: 60px 20px; font-size: 16px; }

        /* ── 모바일 플로팅 뒤로가기 ── */
        .float-back-btn { display: none; }

        /* ── 모바일 반응형 ── */
        @media (max-width: 768px) {
            .float-back-btn {
                display: block;
                position: fixed;
                bottom: 20px;
                right: 16px;
                z-index: 999;
                background: #3498db;
                color: white;
                border: none;
                padding: 10px 18px;
                border-radius: 22px;
                font-size: 13px;
                font-weight: 700;
                cursor: pointer;
                box-shadow: 0 4px 14px rgba(52,152,219,0.4);
            }
        }
            body { padding: 0 !important; }
            .container {
                border-radius: 0 !important;
                padding: 16px !important;
                box-shadow: none !important;
            }
            .header {
                align-items: center !important;
                margin-bottom: 14px !important;
                padding-bottom: 14px !important;
            }
            .youtube-link { font-size: 11px !important; margin-bottom: 5px !important; }
            h1 { font-size: 18px !important; white-space: nowrap !important; }
            .back-btn { padding: 8px 12px !important; font-size: 12px !important; }
            .update-info { font-size: 11px !important; padding: 8px !important; margin-bottom: 16px !important; }
            #newsList { gap: 14px !important; }
            .news-item { padding: 14px !important; }
            .news-date { font-size: 11px !important; margin-bottom: 7px !important; }
            .news-title { font-size: 15px !important; margin-bottom: 8px !important; }
            .news-source { font-size: 11px !important; margin-bottom: 10px !important; }
            .analysis-box { padding: 12px !important; font-size: 13px !important; margin: 10px 0 !important; }
            .news-link { padding: 8px 12px !important; font-size: 12px !important; margin-top: 10px !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <a href="https://www.youtube.com/@투자의정석-z2o" target="_blank" class="youtube-link">🎬 투자의정석</a>
                <h1 id="pageTitle">뉴스</h1>
            </div>
            <button class="back-btn" onclick="goHome()">← 돌아가기</button>
        </div>
        <div class="update-info" id="updateInfo">⏳ 뉴스를 불러오는 중입니다...</div>
        <div id="newsList">
            <div class="loading">
                <div class="loading-spinner"></div>
                AI가 뉴스를 분석하고 있습니다...
            </div>
        </div>
        <div class="error" id="error"></div>
    </div>
    <button class="float-back-btn" onclick="goHome()">← 홈</button>
    <script>
        const params = new URLSearchParams(window.location.search);
        const stock = params.get('stock');
        const stockName = params.get('name');
        if (stockName) document.getElementById('pageTitle').textContent = `${stockName} 뉴스`;

        function goHome() { window.location.href = 'index.html'; }

        function getTimeAgo(isoString) {
            const diffMins = Math.floor((new Date() - new Date(isoString)) / 60000);
            const diffHours = Math.floor(diffMins / 60);
            if (diffMins < 1) return '방금 전';
            if (diffMins < 60) return `${diffMins}분 전`;
            if (diffHours < 24) return `${diffHours}시간 전`;
            return `${Math.floor(diffHours/24)}일 전`;
        }

        async function loadNews() {
            const newsList = document.getElementById('newsList');
            const updateInfo = document.getElementById('updateInfo');
            const error = document.getElementById('error');

            // 5초 후 느린 로딩 안내
            const slowTimer = setTimeout(() => {
                updateInfo.innerHTML = '⏳ AI가 뉴스를 분석하고 있습니다. 조금만 기다려주세요 ☕';
            }, 5000);

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                const response = await fetch(`/api/news?stock=${stock}`, { signal: controller.signal });
                clearTimeout(timeoutId);
                clearTimeout(slowTimer);

                const data = await response.json();
                if (!data.success) {
                    newsList.innerHTML = '';
                    error.textContent = '❌ 뉴스를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.';
                    error.style.display = 'block';
                    updateInfo.innerHTML = '❌ 업데이트 실패';
                    return;
                }
                if (data.updatedAt) {
                    const cacheLabel = data.fromCache ? '🗄️ 캐시 데이터' : '🔄 실시간 데이터';
                    updateInfo.innerHTML = `${cacheLabel} · 마지막 업데이트: <span>${getTimeAgo(data.updatedAt)}</span> · 매 1시간마다 자동 갱신`;
                }
                if (data.news && data.news.length > 0) {
                    newsList.innerHTML = data.news.map(item => `
                        <div class="news-item">
                            <div class="news-date">📅 ${item.publishedAt}</div>
                            <div class="news-title">${item.title}</div>
                            <div class="news-source">📰 ${item.source}</div>
                            ${item.analysis ? `
                            <div class="analysis-box">
                                ${item.analysis
                                    .replace(/\[([^\]]+)\]/g, '<div class="analysis-section-title">[$1]</div>')
                                    .replace(/\n/g, '<br>')}
                            </div>` : `
                            <div style="color:#555;line-height:1.7;margin:15px 0;font-size:15px;">
                                ${item.originalContent}
                            </div>`}
                            <a href="${item.url}" target="_blank" class="news-link">🔗 원문 보기</a>
                        </div>
                    `).join('');
                } else {
                    newsList.innerHTML = '<div class="empty">📭 현재 표시할 뉴스가 없습니다. 잠시 후 다시 확인해주세요.</div>';
                }
            } catch (err) {
                clearTimeout(slowTimer);
                newsList.innerHTML = '';
                if (err.name === 'AbortError') {
                    error.textContent = '⏱️ 로딩 시간이 너무 오래 걸립니다. 페이지를 새로고침해 주세요.';
                } else {
                    error.textContent = '❌ 뉴스를 불러오지 못했습니다. 인터넷 연결을 확인하고 다시 시도해주세요.';
                }
                error.style.display = 'block';
                updateInfo.innerHTML = '❌ 업데이트 실패';
            }
        }
        loadNews();
    </script>
</body>
</html>
